<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iEdit Pro | Advanced Photo Editor</title>
    <style>
        :root {
            --ps-dark: #1e1e1e;
            --ps-bg: #2b2b2b;
            --ps-border: #333;
            --ps-text: #ccc;
            --accent: #00aaff;
        }

        body {
            background: radial-gradient(circle at center, #2e2e2e, var(--ps-dark));
            color: var(--ps-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Menu Bar */
        .menu-bar {
            background: var(--ps-bg);
            padding: 8px 20px;
            border-bottom: 1px solid var(--ps-border);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .menu-items span { margin-right: 15px; cursor: pointer; }
        .menu-items span:hover { color: #fff; }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 80px); /* Adjust for header/footer */
        }

        /* Left Toolbar (Photoshop style) */
        .toolbar {
            width: 50px;
            background: var(--ps-bg);
            border-right: 1px solid var(--ps-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
        }

        .tool-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px; color: #888;
        }
        .tool-btn:hover { background: #3a3a3a; color: #fff; }
        .tool-btn.active { background: #3a3a3a; color: var(--accent); border: 1px solid var(--accent); }

        /* Center Canvas */
        .canvas-area {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }
        
        #canvas {
            border: 2px solid var(--ps-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 100%;
        }

        /* Right Properties Panel */
        .properties-panel {
            width: 280px;
            background: var(--ps-bg);
            border-left: 1px solid var(--ps-border);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-header { font-size: 12px; text-transform: uppercase; color: #777; margin-bottom: 10px; border-bottom: 1px solid var(--ps-border); padding-bottom: 5px;}
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; }
        
        input[type=range] {
            width: 100%; height: 5px; background: #333; accent-color: var(--accent); margin-top: 5px;
        }

        /* Brush Colors */
        .color-picker { display: flex; gap: 5px; margin-top: 10px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot:hover { border-color: #fff; }

        /* Footer */
        .status-bar {
            height: 30px; background: var(--ps-bg);
            border-top: 1px solid var(--ps-border);
            display: flex; align-items: center; padding: 0 20px; font-size: 12px; color: #777;
        }

        #saveBtn {
            background: var(--accent); color: #fff; border: none; padding: 6px 15px;
            border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: auto; transition: background 0.2s;
        }
        #saveBtn:hover { background: #008ecc; }

        #uploadStatus { margin-right: 15px; color: var(--accent); }
    </style>
</head>
<body>

<div class="menu-bar">
    <div class="menu-items">
        <strong>iEdit Ps</strong>
        <span>File</span><span>Edit</span><span>Image</span><span>Layer</span><span>Select</span>
    </div>
    <div>v1.0 Pro</div>
</div>

<div class="workspace">
    <div class="toolbar">
        <div class="tool-btn active" title="Move Tool">✥</div>
        <div class="tool-btn" title="Brush Tool" onclick="setTool('brush')">🖌</div>
        <div class="tool-btn" title="Crop Tool">✂</div>
        <div class="tool-btn" title="Text Tool">T</div>
        <div class="tool-btn" title="Zoom Tool">🔍</div>
    </div>

    <div class="canvas-area">
        <p id="dropText" style="color: #444; position: absolute; font-size: 20px;">Open Photo to Start...</p>
        <canvas id="canvas"></canvas>
    </div>

    <div class="properties-panel">
        <button class="btn" style="background:#333; color:#fff; border:none; padding:10px; border-radius:4px; margin-bottom:20px; cursor:pointer;" onclick="document.getElementById('imgInput').click()">Open Image</button>
        <input type="file" id="imgInput" accept="image/*" style="display:none;" multiple>

        <div class="panel-header">Adjustments</div>
        <div class="control-group">
            <label>Exposure <span id="val_exp">100</span>%</label>
            <input type="range" class="adj" id="exp" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>Contrast <span id="val_con">100</span>%</label>
            <input type="range" class="adj" id="con" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>Vibrance <span id="val_vib">100</span>%</label>
            <input type="range" class="adj" id="vib" min="0" max="200" value="100">
        </div>

        <div class="panel-header">Brush Tools</div>
        <div class="control-group">
            <label>Brush Size <span id="val_br">10</span>px</label>
            <input type="range" id="brushSize" min="1" max="50" value="10">
        </div>
        <div class="color-picker">
            <div class="color-dot" style="background: white;" onclick="setBrushColor('#ffffff')"></div>
            <div class="color-dot" style="background: #ff3b30;" onclick="setBrushColor('#ff3b30')"></div>
            <div class="color-dot" style="background: #4cd964;" onclick="setBrushColor('#4cd964')"></div>
            <div class="color-dot" style="background: #007aff;" onclick="setBrushColor('#007aff')"></div>
            <div class="color-dot" style="background: black; border-color: #444;" onclick="setBrushColor('#000000')"></div>
        </div>
    </div>
</div>

<div class="status-bar">
    <span id="uploadStatus">Ready</span>
    <span>Layers: 1 | Canvas: 1024x768</span>
    <button id="saveBtn">Export & Save</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput');
    const dropText = document.getElementById('dropText');
    const status = document.getElementById('uploadStatus');
    
    let originalImage;
    let currentTool = 'move';
    let isDrawing = false;
    let brushColor = '#ffffff';

    // UI Logic
    imgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    // Canvas Size සකස් කිරීම
                    canvas.width = originalImage.width / 4; // Display optimized size
                    canvas.height = originalImage.height / 4;
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    dropText.style.display = 'none';
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Adjustment Tools (Canvas filter)
    function applyAdjustments() {
        if(!originalImage) return;
        const e = document.getElementById('exp').value;
        const c = document.getElementById('con').value;
        const v = document.getElementById('vib').value;
        
        document.getElementById('val_exp').innerText = e;
        document.getElementById('val_con').innerText = c;
        document.getElementById('val_vib').innerText = v;

        ctx.filter = `brightness(${e}%) contrast(${c}%) saturate(${v}%)`;
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        ctx.filter = 'none'; // Drawing සඳහා filter අයින් කිරීම
    }

    document.querySelectorAll('.adj').forEach(input => {
        input.addEventListener('input', applyAdjustments);
    });

    // Drawing Logic (Gammata Brush Tool)
    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        if(tool === 'brush') document.querySelector('[title="Brush Tool"]').classList.add('active');
    }

    function setBrushColor(color) { brushColor = color; }
    document.getElementById('brushSize').addEventListener('input', (e) => document.getElementById('val_br').innerText = e.target.value);

    canvas.addEventListener('mousedown', (e) => {
        if(currentTool !== 'brush' || !originalImage) return;
        isDrawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    });

    canvas.addEventListener('mousemove', (e) => {
        if(!isDrawing || currentTool !== 'brush') return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.strokeStyle = brushColor;
        ctx.lineWidth = document.getElementById('brushSize').value;
        ctx.lineCap = 'round';
        ctx.stroke();
    });

    canvas.addEventListener('mouseup', () => isDrawing = false);

    // Upload & Save Logic
    document.getElementById('saveBtn').addEventListener('click', async () => {
        if(!originalImage) return alert("Open an image first!");
        
        status.innerText = "Applying Photoshop Filters & Exporting...";
        
        // GitHub Config
        const TOKEN = "";
        const OWNER = "botmduser";
        const REPO = "PHOTO-HACK";

        // Canvas එකේ තියෙන පින්තූරය Base64 string එකක් බවට පත් කිරීම
        const imageData = canvas.toDataURL('image/jpeg');
        const base64 = imageData.split(',')[1];
        
        const fileName = `ps_edit_${Date.now()}.jpg`;

        const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/edited/${fileName}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${TOKEN}` },
            body: JSON.stringify({ message: "Save PS Edit", content: base64 })
        });

        setTimeout(() => {
            if(resp.ok) {
                status.innerText = "Saved to Library Successfully!";
                status.style.color = "#4cd964";
            } else {
                status.innerText = "Error Saving.";
            }
        }, 2000);
    });
</script>

</body>
</html>
